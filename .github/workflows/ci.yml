name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --statistics

      - name: Type check with mypy
        run: mypy --ignore-missing-imports application/ app/ config/

      - name: Check imports sort
        run: |
          pip install isort
          isort --check-only --diff .

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: robolearn
          POSTGRES_PASSWORD: robolearn_test
          POSTGRES_DB: robolearn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Setup test database
        env:
          PGPASSWORD: robolearn_test
        run: |
          createdb -h localhost -U robolearn robolearn_test
          for f in scripts/*.sql; do
            psql -h localhost -U robolearn -d robolearn_test -f "$f"
          done

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key
          POSTGRES_PASSWORD: robolearn_test
          POSTGRES_DB: robolearn_test
          MONGODB_URL: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379/0
          OLLAMA_URL: http://localhost:11434
          CI: true
        run: |
          pytest tests/ \
            --cov=application \
            --cov=app \
            --cov=config \
            --cov-report=term \
            --cov-report=xml \
            --timeout=60 \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm install --save-dev vitest @testing-library/react @testing-library/jest-dom jsdom

      - name: Run tests
        env:
          JWT_SECRET: ci-jwt-secret
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npx vitest run --coverage

  build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, frontend-lint, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: robolearn/backend:ci

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: robolearn/frontend:ci
