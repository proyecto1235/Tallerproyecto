services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: robolearn_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robolearn_dev}
      POSTGRES_DB: ${POSTGRES_DB:-robolearn}
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-127.0.0.1:5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/001-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/scripts/002-seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./backend/scripts/003-seed-massive.sql:/docker-entrypoint-initdb.d/03-massive.sql
      - ./backend/scripts/005-enable-pgvector.sql:/docker-entrypoint-initdb.d/05-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - internal_net

  # ============================================
  # MongoDB Database
  # ============================================
  mongo:
    image: mongo:7
    container_name: robolearn_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-robolearn_dev}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-robolearn_metrics}
    ports:
      - "${MONGO_PORT_EXTERNAL:-127.0.0.1:27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./backend/scripts/004-mongodb-init.js:/docker-entrypoint-initdb.d/init-db.js
      - ./backend/scripts/005-seed-massive-mongo.js:/docker-entrypoint-initdb.d/seed-massive.js
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - internal_net

  # ============================================
  # Redis Cache (for AI caching + rate limiting)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: robolearn_redis
    ports:
      - "${REDIS_PORT_EXTERNAL:-127.0.0.1:6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - internal_net

  # ============================================
  # Ollama (Local LLM for tutor, RAG, generation)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: robolearn_ollama
    ports:
      - "${OLLAMA_PORT_EXTERNAL:-127.0.0.1:11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    restart: always
    networks:
      - ai_net
    entrypoint: sh -c "ollama serve & sleep 3 && ollama pull qwen2.5-coder:1.5b && wait"

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: robolearn_backend
    env_file:
      - .env
    environment:
      APP_NAME: Robolearn API
      DEBUG: "True"
      APP_ENV: development

      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-robolearn}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080

      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robolearn_dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-robolearn}

      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: ${MONGO_DB:-robolearn_metrics}

      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:1.5b}

      DIALOGFLOW_PROJECT_ID: ${DIALOGFLOW_PROJECT_ID:-}
      DIALOGFLOW_AGENT_ID: ${DIALOGFLOW_AGENT_ID:-}
      GOOGLE_CREDENTIALS_PATH: /app/robolearn-key.json

      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8000"]'
    ports:
      - "${BACKEND_PORT_EXTERNAL:-127.0.0.1:8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/robolearn-key.json:/app/robolearn-key.json
      - ./models:/app/models
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - frontend_net
      - internal_net
      - ai_net
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: robolearn_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_JWT_EXPIRATION_DAYS: 7
      JWT_SECRET: ${SECRET_KEY:-dev-secret-key-robolearn}
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-127.0.0.1:3000}:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - frontend_net

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  ollama_data:

networks:
  frontend_net:
    driver: bridge
    internal: false
  internal_net:
    driver: bridge
    internal: true
  ai_net:
    driver: bridge
    internal: false
