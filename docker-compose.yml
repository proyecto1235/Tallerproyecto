
services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: robolearn_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: robolearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/001-create-tables.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/scripts/002-create-procedures.sql:/docker-entrypoint-initdb.d/02-procedures.sql
      - ./backend/scripts/003-seed-data.sql:/docker-entrypoint-initdb.d/03-seed.sql
      - ./backend/scripts/005-enable-pgvector.sql:/docker-entrypoint-initdb.d/05-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - robolearn_network

  # ============================================
  # MongoDB Database
  # ============================================
  mongo:
    image: mongo:7
    container_name: robolearn_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: robolearn_password
      MONGO_INITDB_DATABASE: robolearn_metrics
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./backend/scripts/003-mongodb-init.js:/docker-entrypoint-initdb.d/init-db.js
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - robolearn_network

  # ============================================
  # Redis Cache (for AI caching + rate limiting)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: robolearn_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - robolearn_network

  # ============================================
  # Ollama (Local LLM for tutor, RAG, generation)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: robolearn_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    restart: always
    networks:
      - robolearn_network
    entrypoint: sh -c "ollama serve & sleep 3 && ollama pull qwen2.5-coder:1.5b && wait"

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: robolearn_backend
    environment:
      # App
      APP_NAME: Robolearn API
      DEBUG: "True"
      NODE_ENV: development

      # Security
      SECRET_KEY: your-secret-key-change-in-production-robolearn
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080

      # PostgreSQL
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: robolearn

      # MongoDB
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: robolearn_metrics

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Ollama
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5-coder:1.5b

      # Dialogflow — descomenta y completa para activar el chatbot
      DIALOGFLOW_PROJECT_ID: ""
      DIALOGFLOW_AGENT_ID: ""
      # Ruta al JSON de clave de servicio de Google Cloud (dentro del contenedor)
      GOOGLE_CREDENTIALS_PATH: /app/robolearn-key.json

      # CORS
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173", "http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Monta el código para hot-reload en desarrollo
      - ./backend:/app
      # Monta la clave de servicio de Google (si existe)
      - ./backend/robolearn-key.json:/app/robolearn-key.json
      # Docker socket for sandboxing
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - robolearn_network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: robolearn_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_JWT_EXPIRATION_DAYS: 7
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - robolearn_network

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  ollama_data:

networks:
  robolearn_network:
    driver: bridge
